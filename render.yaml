services:
  - type: web
    name: autonomous-api-builder-api
    runtime: docker
    repo: https://github.com/your-org/autonomous-api-builder
    rootDir: apps/api
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autonomous-api-builder-db
          property: connectionString

databases:
  - name: autonomous-api-builder-db
    plan: free
