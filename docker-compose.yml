version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: autonomous_api_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/autonomous_api_builder
    depends_on:
      - db
    ports:
      - '8000:8000'

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  postgres_data:
