version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: autonomous_api_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/autonomous_api_builder
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: celery
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - db
      - redis
      - otel-collector
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - '8000:8000'

  worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/autonomous_api_builder
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: celery
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - db
      - redis
      - otel-collector
    command: bash -lc "alembic upgrade head && celery -A app.workers.celery_app.celery_app worker --loglevel=info"

  beat:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/autonomous_api_builder
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: celery
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - db
      - redis
      - otel-collector
    command: bash -lc "alembic upgrade head && celery -A app.workers.celery_app.celery_app beat --loglevel=info"

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api
    ports:
      - '3000:3000'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./infra/observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - '16686:16686'

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

volumes:
  postgres_data:
